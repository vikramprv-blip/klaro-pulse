name: Klaro Pulse Scanner
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan'
        required: false
        default: ''
      scan_mode:
        description: 'Scan mode: standard or lam'
        required: false
        default: 'standard'
      lam_run_id:
        description: 'LAM run ID'
        required: false
        default: ''
      user_id:
        description: 'User ID'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install playwright==1.44.0 groq openai requests python-dotenv supabase

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run LAM v6
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          SUPABASE_URL: https://chwyrdublpuavcmjendw.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LAM_USER_ID: ${{ github.event.inputs.user_id }}
          LAM_RUN_ID: ${{ github.event.inputs.lam_run_id }}
        run: |
          TARGET="${{ github.event.inputs.target_url }}"
          echo "Target: $TARGET"
          if [ -n "$TARGET" ]; then
            python3 agents/lam-agent-v6.py "$TARGET"
          else
            echo "No target URL provided"
          fi
