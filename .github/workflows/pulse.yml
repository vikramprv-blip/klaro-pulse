name: Klaro Pulse Scanner
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan'
        required: false
        default: ''
      scan_mode:
        description: 'Scan mode: standard or lam'
        required: false
        default: 'standard'
      lam_run_id:
        description: 'LAM run ID'
        required: false
        default: ''
      user_id:
        description: 'User ID'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: LAM runs via local Docker runner
        run: |
          echo "LAM scans are processed by the local Docker runner"
          echo "Target: ${{ github.event.inputs.target_url }}"
          echo "Run ID: ${{ github.event.inputs.lam_run_id }}"
