name: Klaro Pulse — AI Journey Tests

on:
  push:
    branches: [main, staging]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pulse engine
        run: docker build -t klaro-pulse-engine -f engine/Dockerfile .

      - name: Run AI journey tests
        run: |
          docker run --rm \
            -e SUPABASE_URL=https://vhnvclvzxkybnybqgyci.supabase.co \
            -e SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            -e GITHUB_SHA=${{ github.sha }} \
            -e GITHUB_REF_NAME=${{ github.ref_name }} \
            --shm-size=2gb \
            klaro-pulse-engine
