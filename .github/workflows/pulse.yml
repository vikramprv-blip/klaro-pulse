name: Klaro Pulse — AI Site Scans
on:
  push:
    branches: [main, staging]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Single URL to scan (leave empty for batch scan of all targets)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run site scan
        env:
          SUPABASE_URL: https://chwyrdublpuavcmjendw.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "Single scan: ${{ github.event.inputs.target_url }}"
            node agents/pulse-agent.js "${{ github.event.inputs.target_url }}"
          else
            echo "Batch scan: all active targets"
            node agents/pulse-agent.js
          fi
