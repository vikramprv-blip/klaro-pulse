name: Klaro Pulse Scanner
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan'
        required: false
        default: ''
      scan_mode:
        description: 'Scan mode: standard or lam'
        required: false
        default: 'standard'
      lam_run_id:
        description: 'LAM run ID from lam_runs table'
        required: false
        default: ''
      user_id:
        description: 'User ID'
        required: false
        default: ''
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install --upgrade pip
          pip install browser-use==0.12.6
          pip install langchain-groq langchain-openai langchain-google-genai
          pip install playwright python-dotenv supabase
          python -m playwright install chromium --with-deps
      - name: Run scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SUPABASE_URL: https://chwyrdublpuavcmjendw.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LAM_USER_ID: ${{ github.event.inputs.user_id }}
          LAM_RUN_ID: ${{ github.event.inputs.lam_run_id }}
        run: |
          TARGET="${{ github.event.inputs.target_url }}"
          MODE="${{ github.event.inputs.scan_mode }}"
          echo "Mode: $MODE | Target: $TARGET"
          if [ "$MODE" = "lam" ] && [ -n "$TARGET" ]; then
            echo "Starting LAM audit: $TARGET"
            python3 agents/lam-agent.py "$TARGET"
          elif [ -n "$TARGET" ]; then
            echo "Standard scan: $TARGET"
            python3 agents/lam-agent.py "$TARGET"
          else
            echo "No target specified"
          fi
