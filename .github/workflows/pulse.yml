name: Klaro Pulse Scanner
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Single URL to scan (leave empty for batch)'
        required: false
        default: ''
      scan_mode:
        description: 'Scan mode: standard or lam'
        required: false
        default: 'standard'
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Node dependencies
        run: npm install
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install browser-use==0.12.6
          pip install langchain-google-genai langchain-groq langchain-openai
          pip install playwright python-dotenv supabase google-generativeai
          pip show browser-use | grep Version
      - name: Run scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          SUPABASE_URL: https://chwyrdublpuavcmjendw.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TARGET="${{ github.event.inputs.target_url }}"
          MODE="${{ github.event.inputs.scan_mode }}"
          if [ "$MODE" = "lam" ] && [ -n "$TARGET" ]; then
            echo "LAM scan: $TARGET"
            python3 agents/lam-agent.py "$TARGET"
          elif [ -n "$TARGET" ]; then
            echo "Standard scan: $TARGET"
            node agents/pulse-agent.js "$TARGET"
          else
            echo "Batch scan"
            node agents/pulse-agent.js
          fi
