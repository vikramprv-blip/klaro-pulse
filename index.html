<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaro Pulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen">
  <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center border-b border-slate-900">
    <div class="text-white font-black text-xl tracking-tight">KLARO <span class="text-indigo-500">PULSE</span></div>
    <div id="live-badge" class="flex items-center gap-2 text-xs text-slate-500">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Live
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-12">
    <div class="mb-10">
      <h1 class="text-3xl font-black text-white mb-1">Journey Monitor</h1>
      <p class="text-slate-500 text-sm">All active journeys — latest run results</p>
    </div>

    <div id="stats" class="grid grid-cols-3 gap-4 mb-10"></div>
    <div id="journeys" class="space-y-4"></div>
    <div id="loading" class="text-slate-500 text-sm">Loading journeys...</div>
  </main>

  <script>
    const SUPABASE_URL = 'REPLACE_WITH_YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'REPLACE_WITH_YOUR_SUPABASE_ANON_KEY';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function load() {
      const { data: outcomes } = await db
        .from('outcomes')
        .select('*, journeys(name, goal, target_url), test_runs(commit_sha, started_at)')
        .order('created_at', { ascending: false });

      document.getElementById('loading').remove();

      // Deduplicate — latest outcome per journey
      const seen = new Set();
      const latest = (outcomes || []).filter(o => {
        if (seen.has(o.journey_id)) return false;
        seen.add(o.journey_id);
        return true;
      });

      const total = latest.length;
      const passed = latest.filter(o => o.passed).length;
      const failed = total - passed;

      document.getElementById('stats').innerHTML = `
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
          <div class="text-3xl font-black text-white">${total}</div>
          <div class="text-xs text-slate-500 mt-1 uppercase tracking-wider">Total Journeys</div>
        </div>
        <div class="bg-emerald-950 border border-emerald-900 rounded-2xl p-6">
          <div class="text-3xl font-black text-emerald-400">${passed}</div>
          <div class="text-xs text-slate-500 mt-1 uppercase tracking-wider">Passing</div>
        </div>
        <div class="bg-red-950 border border-red-900 rounded-2xl p-6">
          <div class="text-3xl font-black text-red-400">${failed}</div>
          <div class="text-xs text-slate-500 mt-1 uppercase tracking-wider">Failing</div>
        </div>
      `;

      const container = document.getElementById('journeys');
      if (!latest.length) {
        container.innerHTML = '<div class="text-slate-600 text-sm">No results yet — push to main to trigger the first run.</div>';
        return;
      }

      latest.forEach(o => {
        const j = o.journeys;
        const r = o.test_runs;
        const statusColor = o.passed ? 'text-emerald-400 bg-emerald-950 border-emerald-900' : 'text-red-400 bg-red-950 border-red-900';
        const dot = o.passed ? 'bg-emerald-400' : 'bg-red-400';
        const label = o.passed ? 'PASSED' : 'FAILED';
        const date = r?.started_at ? new Date(r.started_at).toLocaleString() : '—';
        const sha = r?.commit_sha ? r.commit_sha.slice(0, 7) : '—';

        container.innerHTML += `
          <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-6 flex items-center justify-between gap-6 hover:border-slate-700 transition-all">
            <div class="flex items-start gap-4 flex-1">
              <div class="w-3 h-3 rounded-full ${dot} mt-1 flex-shrink-0"></div>
              <div>
                <div class="text-white font-bold">${j?.name || 'Unknown'}</div>
                <div class="text-slate-500 text-sm mt-0.5">${j?.goal || ''}</div>
                <div class="text-slate-600 text-xs mt-2">
                  ${o.passed_steps}/${o.total_steps} steps passed &nbsp;·&nbsp; ${date} &nbsp;·&nbsp; <span class="font-mono">${sha}</span>
                </div>
              </div>
            </div>
            <div class="px-4 py-2 rounded-xl border text-xs font-black ${statusColor}">${label}</div>
          </div>
        `;
      });
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
