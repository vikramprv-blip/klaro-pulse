<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Klaro Sentinel | Client Audit Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0a0a0f] text-slate-400 font-sans p-6 md:p-12">
    <div id="gate" class="max-w-md mx-auto mt-32 p-8 bg-slate-900 border border-slate-800 rounded-3xl text-center shadow-2xl">
        <h2 class="text-white font-bold text-xl mb-6 tracking-tighter">SECURE AUDIT PORTAL</h2>
        <input type="password" id="key" class="w-full bg-black border border-slate-700 p-4 rounded-2xl mb-6 text-center text-indigo-400 focus:border-indigo-500 outline-none">
        <button onclick="auth()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-500 transition-all">ACCESS REPORT FEED</button>
    </div>

    <div id="dash" class="hidden max-w-5xl mx-auto">
        <header class="mb-16 border-b border-slate-900 pb-10 flex justify-between items-end">
            <div>
                <h1 class="text-white text-3xl font-black italic tracking-tighter">KLARO <span class="text-indigo-500">SENTINEL</span></h1>
                <p class="text-xs uppercase tracking-[0.4em] text-slate-500 mt-2">Professional Audit & Compliance Feed</p>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-slate-500 uppercase mb-1">Global Health Index</div>
                <div id="health-index" class="text-3xl font-black text-white">--%</div>
            </div>
        </header>

        <div id="reports" class="space-y-12">
            </div>
    </div>

    <script>
        let sb;
        async function auth() {
            const k = document.getElementById('key').value;
            sb = supabase.createClient('https://vhnvclvzxkybnybqgyci.supabase.co', k);
            const { error } = await sb.from('pulse_logs').select('id').limit(1);
            if (error) return alert("AUTH_FAILED");
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
            load();
        }

        async function load() {
            const { data } = await sb.from('pulse_logs').select('*').order('created_at', { ascending: false }).limit(10);
            if (!data) return;

            const avgHealth = Math.round(data.reduce((acc, curr) => acc + (curr.metadata?.full_report?.authority_score || 0), 0) / data.length);
            document.getElementById('health-index').innerText = `${avgHealth}%`;

            document.getElementById('reports').innerHTML = data.map(log => {
                const report = log.metadata?.full_report || {};
                const isFail = log.status === 'DEGRADED';
                
                return `
                <div class="bg-slate-900/50 border ${isFail ? 'border-red-900/30' : 'border-slate-800'} rounded-3xl p-8 backdrop-blur-sm">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <span class="text-[10px] bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded-full font-bold uppercase tracking-widest mb-3 inline-block">
                                ${log.url.includes('nomad') ? 'NomadPilot Global' : 'Klaro Services US'}
                            </span>
                            <h2 class="text-white text-2xl font-bold">${report.novice_summary || 'Diagnostic Pending...'}</h2>
                        </div>
                        <div class="text-center">
                            <div class="text-[10px] text-slate-500 uppercase mb-1 font-bold">Audit Score</div>
                            <div class="text-3xl font-black ${report.authority_score > 80 ? 'text-green-500' : 'text-red-500'}">${report.authority_score || '--'}</div>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="space-y-6">
                            <div>
                                <h4 class="text-indigo-400 text-[10px] font-black uppercase tracking-widest mb-3">UX Friction Points</h4>
                                <ul class="space-y-2">
                                    ${(report.ux_friction_points || []).map(p => `<li class="text-sm text-slate-300 flex gap-2"><span>→</span> ${p}</li>`).join('')}
                                </ul>
                            </div>
                            <div>
                                <h4 class="text-red-400 text-[10px] font-black uppercase tracking-widest mb-3">Technical Blockers</h4>
                                <ul class="space-y-2">
                                    ${(report.technical_blockers || []).map(p => `<li class="text-sm text-slate-400 font-mono">⚠️ ${p}</li>`).join('')}
                                </ul>
                            </div>
                        </div>

                        <div class="bg-black/40 rounded-2xl p-6 border border-slate-800">
                            <h4 class="text-green-400 text-[10px] font-black uppercase tracking-widest mb-4">Required Resolution Steps</h4>
                            <div class="space-y-4">
                                ${(report.resolution_steps || []).map((s, i) => `
                                    <div class="flex gap-4">
                                        <span class="text-indigo-500 font-bold text-xs">0${i+1}</span>
                                        <p class="text-xs text-slate-300 leading-relaxed">${s}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center">
                        <span class="text-[9px] text-slate-600 font-mono">AUDIT_REF: ${log.id.slice(0,8)}</span>
                        <span class="text-[9px] text-slate-600 font-mono">${new Date(log.created_at).toLocaleString()}</span>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
