<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Klaro Sentinel | Diagnostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-slate-300 font-mono p-8">
    <div id="gate" class="max-w-md mx-auto mt-40 p-8 bg-slate-900 rounded-xl border border-slate-800 text-center">
        <h1 class="text-white font-bold mb-6 italic tracking-widest text-xs">SECURITY GATE</h1>
        <input type="password" id="key" class="w-full bg-black border border-slate-700 p-3 rounded mb-4 text-center text-indigo-400 outline-none focus:border-indigo-500">
        <button onclick="auth()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded hover:bg-indigo-500 transition-all">DECRYPT DASHBOARD</button>
    </div>

    <div id="dash" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-12 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-black text-white">SYSTEM <span class="text-indigo-500">DIAGNOSTICS</span></h1>
                <p class="text-slate-500 text-[10px]">RECIPIENT: VIKRAM CHAWLA | SECURITY_LEVEL: OMNI</p>
            </div>
            <button onclick="load()" class="text-[10px] text-indigo-500 border border-indigo-500/30 px-3 py-1 rounded hover:bg-indigo-500/10">REFRESH_FEED</button>
        </header>

        <div id="reports" class="space-y-8">
            <div class="animate-pulse text-indigo-500">Querying Supabase clusters...</div>
        </div>
    </div>

    <script>
        let sb;
        async function auth() {
            const k = document.getElementById('key').value;
            sb = supabase.createClient('https://vhnvclvzxkybnybqgyci.supabase.co', k);
            const { error } = await sb.from('pulse_logs').select('id').limit(1);
            if (error) return alert("UNAUTHORIZED");
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
            load();
        }

        async function load() {
            const { data, error } = await sb.from('pulse_logs').select('*').order('created_at', { ascending: false }).limit(10);
            if (error || !data.length) {
                document.getElementById('reports').innerHTML = `<div class="p-8 border border-dashed border-slate-800 text-center">NO RECENT PULSE DATA FOUND. TRIGGER GITHUB ACTION.</div>`;
                return;
            }

            document.getElementById('reports').innerHTML = data.map(log => {
                const meta = log.metadata || {};
                const issues = (meta.console_logs?.filter(l => l.includes('error')) || []).length + (meta.broken_links?.length || 0);
                
                return `
                <div class="bg-slate-900/30 border border-slate-800 rounded-lg overflow-hidden shadow-2xl">
                    <div class="bg-slate-800/50 px-6 py-2 flex justify-between items-center text-[10px] border-b border-slate-800">
                        <span class="text-indigo-400 font-bold">${log.url}</span>
                        <span class="text-slate-500">${new Date(log.created_at).toLocaleString()}</span>
                    </div>
                    
                    <div class="p-6 grid md:grid-cols-3 gap-6">
                        <div class="col-span-2">
                            <h3 class="text-white font-bold mb-2 text-sm uppercase tracking-tighter">AI Reasoner Audit</h3>
                            <div class="text-slate-400 text-xs leading-relaxed bg-black/40 p-4 rounded border border-slate-800/50 italic">
                                "${log.reasoning}"
                            </div>
                        </div>
                        
                        <div class="space-y-4">
                            <div class="bg-black/60 p-4 rounded border border-slate-800">
                                <div class="text-[9px] text-slate-500 uppercase mb-2">Technical Health</div>
                                <div class="flex flex-col gap-2">
                                    <div class="flex justify-between text-xs">
                                        <span>Broken Links</span>
                                        <span class="${meta.broken_links?.length > 0 ? 'text-red-500' : 'text-green-500'} font-bold">${meta.broken_links?.length || 0}</span>
                                    </div>
                                    <div class="flex justify-between text-xs">
                                        <span>JS Console Errors</span>
                                        <span class="${meta.console_logs?.some(l => l.includes('error')) ? 'text-red-400' : 'text-green-500'} font-bold">${meta.console_logs?.filter(l => l.includes('error')).length || 0}</span>
                                    </div>
                                    <div class="flex justify-between text-xs">
                                        <span>Latency</span>
                                        <span class="text-indigo-400 font-bold">${log.latency_ms || '0'}ms</span>
                                    </div>
                                </div>
                            </div>

                            ${meta.action_taken ? `
                            <div class="bg-indigo-900/10 p-4 rounded border border-indigo-500/20">
                                <div class="text-[9px] text-indigo-400 uppercase mb-1 font-bold italic underline">LAM Action Taken</div>
                                <div class="text-[10px] text-slate-300 font-bold">${meta.action_taken.selector}</div>
                                <div class="text-[9px] text-slate-500 mt-1">${meta.action_taken.reason}</div>
                            </div>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
