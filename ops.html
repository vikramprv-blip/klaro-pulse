<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Klaro Pulse | Diagnostic Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-slate-300 font-mono">
    <div id="gate" class="max-w-md mx-auto mt-40 p-8 bg-slate-900 rounded-xl border border-slate-800 text-center">
        <h1 class="text-white font-bold mb-6 italic">KLARO SENTINEL ACCESS</h1>
        <input type="password" id="key" class="w-full bg-black border border-slate-700 p-3 rounded mb-4 text-center text-indigo-400">
        <button onclick="auth()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded">INITIATE DEEP SCAN VIEW</button>
    </div>

    <div id="dash" class="hidden p-8">
        <div class="flex justify-between items-end mb-12 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-black text-white">SYSTEM DIAGNOSTICS</h1>
                <p class="text-slate-500 text-xs">Monitoring: Klaro Services & NomadPilot.app</p>
            </div>
            <div id="global-status" class="text-right">
                <span class="text-[10px] text-slate-500 uppercase">System Status</span>
                <div class="text-green-500 font-bold">ALL SYSTEMS NOMINAL</div>
            </div>
        </div>

        <div id="reports" class="grid grid-cols-1 gap-12">
            </div>
    </div>

    <script>
        let sb;
        async function auth() {
            const k = document.getElementById('key').value;
            sb = supabase.createClient('https://vhnvclvzxkybnybqgyci.supabase.co', k);
            const { data, error } = await sb.from('pulse_logs').select('*').limit(1);
            if (error) return alert("UNAUTHORIZED");
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
            load();
        }

        async function load() {
            const { data } = await sb.from('pulse_logs').select('*').order('created_at', { ascending: false }).limit(20);
            
            document.getElementById('reports').innerHTML = data.map(log => {
                const meta = log.metadata || {};
                const hasIssues = (meta.errors?.length > 0 || meta.broken_links?.length > 0);
                
                return `
                <div class="border-l-2 ${hasIssues ? 'border-red-500' : 'border-indigo-500'} bg-slate-900/50 p-6">
                    <div class="flex justify-between mb-4">
                        <span class="text-xl font-bold text-white">${log.url}</span>
                        <span class="text-slate-500">${new Date(log.created_at).toLocaleTimeString()}</span>
                    </div>

                    <div class="grid grid-cols-3 gap-4 mb-6 text-center">
                        <div class="bg-black p-3 rounded">
                            <div class="text-[10px] text-slate-500">BROKEN LINKS</div>
                            <div class="${meta.broken_links?.length > 0 ? 'text-red-500' : 'text-slate-300'} font-bold">${meta.broken_links?.length || 0}</div>
                        </div>
                        <div class="bg-black p-3 rounded">
                            <div class="text-[10px] text-slate-500">JS ERRORS</div>
                            <div class="${meta.errors?.length > 0 ? 'text-red-500' : 'text-slate-300'} font-bold">${meta.errors?.length || 0}</div>
                        </div>
                        <div class="bg-black p-3 rounded">
                            <div class="text-[10px] text-slate-500">LATENCY</div>
                            <div class="text-indigo-400 font-bold">${log.latency_ms}ms</div>
                        </div>
                    </div>

                    <div class="text-sm text-slate-400 leading-relaxed italic border-t border-slate-800 pt-4">
                        "${log.reasoning}"
                    </div>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
