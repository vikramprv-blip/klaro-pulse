<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klaro Pulse — Site Intelligence Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .score-ring { transition: stroke-dashoffset 1s ease; }
</style>
</head>
<body class="bg-[#030712] text-slate-400 min-h-screen">

<!-- Auth Gate -->
<div id="gate" class="max-w-md mx-auto mt-32 p-10 bg-slate-900/40 border border-slate-800 rounded-3xl text-center">
  <div class="text-white font-black text-xl tracking-tight mb-1">KLARO <span class="text-indigo-500">PULSE</span></div>
  <p class="text-slate-600 text-xs mb-8 tracking-widest uppercase">Site Intelligence Portal</p>
  <input type="password" id="key" class="w-full bg-black/40 border border-slate-700 p-4 rounded-2xl mb-4 text-center text-white focus:border-indigo-500 outline-none text-sm" placeholder="Enter access key"/>
  <button onclick="auth()" class="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-500 transition-all text-sm">Access Dashboard →</button>
  <p class="text-slate-700 text-xs mt-4">Contact ops@klaro.services for access</p>
</div>

<!-- Dashboard -->
<div id="dash" class="hidden">

  <!-- Header -->
  <div class="border-b border-slate-900 bg-black/20 sticky top-0 z-10 backdrop-blur">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="text-white font-black text-lg tracking-tight">KLARO <span class="text-indigo-500">PULSE</span></div>
        <span class="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded-full font-bold">INTELLIGENCE</span>
      </div>
      <div class="flex items-center gap-6">
        <div class="text-center">
          <div class="text-xs text-slate-600 uppercase tracking-widest">Portfolio Score</div>
          <div id="avg-score" class="text-2xl font-black text-white">—</div>
        </div>
        <div class="text-center">
          <div class="text-xs text-slate-600 uppercase tracking-widest">Sites Scanned</div>
          <div id="total-scanned" class="text-2xl font-black text-white">—</div>
        </div>
        <button onclick="showScanInput()" class="px-4 py-2 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-500 transition-all">+ Scan New Site</button>
      </div>
    </div>
  </div>

  <!-- Scan input bar -->
  <div id="scan-bar" class="hidden bg-slate-900/50 border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex gap-3 items-center">
      <input id="scan-url" type="url" placeholder="https://competitor.com" class="flex-1 bg-black/40 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-indigo-500"/>
      <input id="scan-name" placeholder="Company name" class="w-48 bg-black/40 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-indigo-500"/>
      <button onclick="addTarget()" class="px-5 py-2.5 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-500">Add to Queue</button>
      <button onclick="document.getElementById('scan-bar').classList.add('hidden')" class="px-4 py-2.5 text-slate-500 text-sm">Cancel</button>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="max-w-7xl mx-auto px-6 py-5 flex items-center gap-3 flex-wrap">
    <span class="text-xs text-slate-600 uppercase tracking-widest font-bold">Filter:</span>
    <button onclick="filterReports('all')" class="filter-btn active px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-800 bg-slate-900 text-white">All</button>
    <button onclick="filterReports('UP')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-800 text-slate-500 hover:text-white hover:bg-slate-900">Strong (75+)</button>
    <button onclick="filterReports('DEGRADED')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-800 text-slate-500 hover:text-white hover:bg-slate-900">Needs Work</button>
    <button onclick="filterReports('DOWN')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-800 text-slate-500 hover:text-white hover:bg-slate-900">Critical (&lt;50)</button>
    <div class="flex-1"></div>
    <input id="search" onkeyup="searchReports()" placeholder="Search sites..." class="bg-black/40 border border-slate-800 rounded-xl px-3 py-1.5 text-sm text-white outline-none focus:border-indigo-500 w-48"/>
  </div>

  <!-- Reports grid -->
  <div class="max-w-7xl mx-auto px-6 pb-16">
    <div id="loading" class="text-center py-20 text-slate-600">Loading intelligence reports...</div>
    <div id="reports" class="space-y-6"></div>
  </div>
</div>

<script>
let sb, allLogs = [];

async function auth() {
  const k = document.getElementById('key').value.trim();
  if (!k) return;
  sb = supabase.createClient('https://chwyrdublpuavcmjendw.supabase.co', k);
  const { error } = await sb.from('pulse_logs').select('id').limit(1);
  if (error) { alert('Access denied. Check your key.'); return; }
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('dash').classList.remove('hidden');
  load();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter' && !document.getElementById('gate').classList.contains('hidden')) auth(); });

function showScanInput() { document.getElementById('scan-bar').classList.toggle('hidden'); }

async function addTarget() {
  const url = document.getElementById('scan-url').value.trim();
  const name = document.getElementById('scan-name').value.trim() || new URL(url).hostname;
  if (!url) return alert('Enter a URL');
  const { error } = await sb.from('pulse_targets').insert([{
    name, url,
    mission: 'Audit this website for UX friction, trust signals, conversion clarity and competitive weaknesses. Return authority_score (0-100), novice_summary, ux_friction_points array, resolution_steps array, strengths array, revenue_opportunities array, competitor_advantage, trust_score, conversion_score, mobile_readiness, target_audience_clarity, pricing_clarity, cta_effectiveness, industry.'
  }]);
  if (error) return alert('Error: ' + error.message);
  document.getElementById('scan-url').value = '';
  document.getElementById('scan-name').value = '';
  document.getElementById('scan-bar').classList.add('hidden');
  alert(`✅ ${name} added to scan queue. Run the agent to generate the report.`);
}

async function load() {
  const { data, error } = await sb.from('pulse_logs').select('*').order('created_at', { ascending: false }).limit(100);
  document.getElementById('loading').classList.add('hidden');
  if (error || !data?.length) {
    document.getElementById('reports').innerHTML = `<div class="text-center py-20 text-slate-600"><p class="text-4xl mb-4">📡</p><p class="text-lg font-bold text-slate-500 mb-2">No scans yet</p><p class="text-sm">Run the agent to start scanning: <code class="text-indigo-400">node agents/pulse-agent.js</code></p></div>`;
    return;
  }
  allLogs = data;
  const scores = data.map(l => l.metadata?.full_report?.authority_score || 0);
  const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  document.getElementById('avg-score').textContent = avg + '/100';
  document.getElementById('total-scanned').textContent = data.length;
  renderReports(data);
}

function scoreColor(s) { return s>=75?'text-green-400':s>=50?'text-yellow-400':'text-red-400'; }
function scoreBg(s) { return s>=75?'bg-green-500/10 border-green-500/20':s>=50?'bg-yellow-500/10 border-yellow-500/20':'bg-red-500/10 border-red-500/20'; }
function scoreBar(s) { return s>=75?'bg-green-500':s>=50?'bg-yellow-500':'bg-red-500'; }
function ago(ts) { if(!ts)return'—'; const m=Math.floor((Date.now()-new Date(ts))/60000); if(m<1)return'just now'; if(m<60)return m+'m ago'; if(m<1440)return Math.floor(m/60)+'h ago'; return Math.floor(m/1440)+'d ago'; }
function pill(label, val, good, bad) {
  const cls = val===good?'bg-green-500/10 text-green-400 border-green-500/20':val===bad?'bg-red-500/10 text-red-400 border-red-500/20':'bg-yellow-500/10 text-yellow-400 border-yellow-500/20';
  return `<span class="px-2 py-0.5 rounded-full text-xs font-bold border ${cls}">${label}: ${val||'—'}</span>`;
}

function renderReports(logs) {
  if (!logs.length) {
    document.getElementById('reports').innerHTML = `<div class="text-center py-12 text-slate-600">No results match your filter.</div>`;
    return;
  }
  document.getElementById('reports').innerHTML = logs.map(log => {
    const r = log.metadata?.full_report || {};
    const name = log.metadata?.target_name || new URL(log.url||'https://unknown.com').hostname;
    const score = r.authority_score || 0;
    const trust = r.trust_score || 0;
    const conv = r.conversion_score || 0;

    return `
    <div class="bg-slate-900/30 border border-slate-800/60 rounded-2xl overflow-hidden hover:border-slate-700 transition-all" data-status="${log.status}" data-name="${name.toLowerCase()}" data-url="${(log.url||'').toLowerCase()}">
      
      <!-- Card Header -->
      <div class="px-8 py-6 flex items-start justify-between gap-6 border-b border-slate-800/60">
        <div class="flex-1">
          <div class="flex items-center gap-3 mb-3 flex-wrap">
            <a href="${log.url}" target="_blank" class="text-white font-black text-xl hover:text-indigo-400 transition-colors">${name}</a>
            <a href="${log.url}" target="_blank" class="text-slate-600 text-xs hover:text-slate-400">${log.url}</a>
            <span class="text-xs text-slate-600">${ago(log.created_at)}</span>
          </div>
          <p class="text-slate-300 text-sm leading-relaxed max-w-2xl">${r.novice_summary || log.reasoning || '—'}</p>
          ${r.competitor_advantage ? `<p class="text-amber-400/80 text-xs mt-3 italic">💡 ${r.competitor_advantage}</p>` : ''}
        </div>
        
        <!-- Score Circle -->
        <div class="flex-shrink-0 text-center">
          <div class="w-24 h-24 rounded-full border-4 ${score>=75?'border-green-500/30':score>=50?'border-yellow-500/30':'border-red-500/30'} flex flex-col items-center justify-center bg-black/30">
            <span class="text-3xl font-black ${scoreColor(score)}">${score}</span>
            <span class="text-xs text-slate-600 font-bold">/100</span>
          </div>
          <div class="text-xs text-slate-600 mt-1 font-bold uppercase tracking-wide">${log.status}</div>
        </div>
      </div>

      <!-- Score bars -->
      <div class="px-8 py-4 grid grid-cols-3 gap-4 border-b border-slate-800/40">
        ${[['Overall', score],['Trust', trust],['Conversion', conv]].map(([l,v])=>`
          <div>
            <div class="flex justify-between text-xs mb-1.5">
              <span class="text-slate-500 font-semibold">${l}</span>
              <span class="${scoreColor(v)} font-bold">${v}/100</span>
            </div>
            <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
              <div class="${scoreBar(v)} h-full rounded-full transition-all" style="width:${v}%"></div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Pills row -->
      <div class="px-8 py-3 flex flex-wrap gap-2 border-b border-slate-800/40">
        ${pill('Mobile', r.mobile_readiness, 'Good', 'Poor')}
        ${pill('Audience', r.target_audience_clarity, 'Clear', 'Confusing')}
        ${pill('Pricing', r.pricing_clarity, 'Clear', 'Hidden')}
        ${pill('CTA', r.cta_effectiveness, 'Strong', 'Missing')}
        ${r.industry ? `<span class="px-2 py-0.5 rounded-full text-xs font-bold border bg-indigo-500/10 text-indigo-400 border-indigo-500/20">${r.industry}</span>` : ''}
        ${r.load_time_ms ? `<span class="px-2 py-0.5 rounded-full text-xs font-bold border ${r.load_time_ms<3000?'bg-green-500/10 text-green-400 border-green-500/20':'bg-red-500/10 text-red-400 border-red-500/20'}">Load: ${(r.load_time_ms/1000).toFixed(1)}s</span>` : ''}
      </div>

      <!-- Issues + Fixes + Opportunities -->
      <div class="px-8 py-6 grid md:grid-cols-3 gap-6">
        <div>
          <h4 class="text-red-400 text-xs font-black uppercase tracking-widest mb-3 flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full"></span> Problems Found
          </h4>
          <div class="space-y-2">
            ${(r.ux_friction_points||[]).map(p=>`<div class="text-xs text-slate-400 bg-red-500/5 border border-red-500/10 rounded-xl p-3 leading-relaxed">⚠ ${p}</div>`).join('') || '<div class="text-xs text-slate-600">None detected</div>'}
          </div>
        </div>
        <div>
          <h4 class="text-green-400 text-xs font-black uppercase tracking-widest mb-3 flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full"></span> How to Fix
          </h4>
          <div class="space-y-2">
            ${(r.resolution_steps||[]).map((s,i)=>`<div class="text-xs text-slate-400 bg-green-500/5 border border-green-500/10 rounded-xl p-3 leading-relaxed"><span class="text-green-500 font-bold font-mono mr-1">0${i+1}</span>${s}</div>`).join('') || '<div class="text-xs text-slate-600">—</div>'}
          </div>
        </div>
        <div>
          <h4 class="text-amber-400 text-xs font-black uppercase tracking-widest mb-3 flex items-center gap-2">
            <span class="w-2 h-2 bg-amber-500 rounded-full"></span> Revenue Opportunities
          </h4>
          <div class="space-y-2">
            ${(r.revenue_opportunities||[]).map(o=>`<div class="text-xs text-slate-400 bg-amber-500/5 border border-amber-500/10 rounded-xl p-3 leading-relaxed">💰 ${o}</div>`).join('') || '<div class="text-xs text-slate-600">—</div>'}
          </div>
        </div>
      </div>

      ${(r.strengths||[]).length ? `
      <div class="px-8 pb-6">
        <h4 class="text-indigo-400 text-xs font-black uppercase tracking-widest mb-3">What They Do Well</h4>
        <div class="flex flex-wrap gap-2">
          ${(r.strengths||[]).map(s=>`<span class="text-xs text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-3 py-1.5">✓ ${s}</span>`).join('')}
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function filterReports(status) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','bg-slate-900','text-white'));
  event.target.classList.add('active','bg-slate-900','text-white');
  const filtered = status === 'all' ? allLogs : allLogs.filter(l => l.status === status);
  renderReports(filtered);
}

function searchReports() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allLogs.filter(l => {
    const name = (l.metadata?.target_name || '').toLowerCase();
    const url = (l.url || '').toLowerCase();
    const summary = (l.reasoning || '').toLowerCase();
    return name.includes(q) || url.includes(q) || summary.includes(q);
  });
  renderReports(filtered);
}
</script>
</body>
</html>
