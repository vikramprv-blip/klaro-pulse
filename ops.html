<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Klaro Sentinel | Executive Audit Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#030712] text-slate-400 font-sans p-4 md:p-10">

    <div id="gate" class="max-w-md mx-auto mt-32 p-10 bg-slate-900/30 border border-slate-800 rounded-[2.5rem] backdrop-blur-3xl text-center">
        <h2 class="text-white font-black tracking-[0.3em] text-[10px] mb-8 uppercase">Secure Sentinel Link</h2>
        <input type="password" id="key" class="w-full bg-black/40 border border-slate-700 p-4 rounded-2xl mb-6 text-center text-white focus:border-indigo-500 outline-none" placeholder="••••••••">
        <button onclick="auth()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-500 shadow-2xl transition-all">VIEW AUDIT REPORT</button>
    </div>

    <div id="dash" class="hidden max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-16 border-b border-slate-900 pb-10">
            <div>
                <h1 class="text-white text-3xl font-black tracking-tighter uppercase">Klaro <span class="text-indigo-500">Sentinel</span></h1>
                <p class="text-[10px] text-slate-500 tracking-[0.4em] font-bold mt-1">OPERATIONAL CERTAINTY ENGINE</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Portfolio Health</p>
                <div id="health-index" class="text-4xl font-black text-white">--%</div>
            </div>
        </header>

        <div id="reports" class="space-y-20">
            </div>
    </div>

    <script>
        let sb;
        async function auth() {
            const k = document.getElementById('key').value;
            sb = supabase.createClient('https://chwyrdublpuavcmjendw.supabase.co', k);
            const { error } = await sb.from('pulse_logs').select('id').limit(1);
            if (error) return alert("UNAUTHORIZED");
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
            load();
        }

        async function load() {
            const { data } = await sb.from('pulse_logs').select('*').order('created_at', { ascending: false }).limit(6);
            if (!data) return;

            const scores = data.map(l => l.metadata?.full_report?.authority_score || 0);
            const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
            document.getElementById('health-index').innerText = `${avg}%`;

            document.getElementById('reports').innerHTML = data.map(log => {
                const report = log.metadata?.full_report || {};
                const score = report.authority_score || 0;
                const statusColor = score > 85 ? 'text-green-500' : (score > 60 ? 'text-yellow-500' : 'text-red-500');
                const borderColor = score > 85 ? 'border-green-900/20' : (score > 60 ? 'border-yellow-900/20' : 'border-red-900/20');
                
                return `
                <div class="relative group">
                    <div class="bg-slate-900/20 border ${borderColor} rounded-[3rem] p-8 md:p-14 transition-all hover:bg-slate-900/30">
                        <div class="flex flex-col md:flex-row justify-between gap-8 mb-12">
                            <div class="max-w-2xl">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 text-[9px] font-black rounded-full border border-indigo-500/20 uppercase tracking-widest">
                                        Target: ${log.url.includes('nomad') ? 'NomadPilot Global' : 'Klaro Services US'}
                                    </span>
                                </div>
                                <h2 class="text-white text-3xl md:text-4xl font-black leading-tight mb-6">
                                    ${report.novice_summary || "Diagnostic analysis in progress..."}
                                </h2>
                                <p class="text-slate-500 text-sm italic font-medium">Mission Objective: ${log.metadata?.mission}</p>
                            </div>
                            <div class="flex-none text-center">
                                <div class="w-32 h-32 rounded-full border-4 ${borderColor} flex flex-col items-center justify-center bg-black/40 shadow-2xl">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">Certainty</span>
                                    <span class="text-4xl font-black ${statusColor}">${score}%</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-12 border-t border-slate-900 pt-12">
                            <div>
                                <h4 class="text-white text-[10px] font-black uppercase tracking-[0.3em] mb-6 flex items-center gap-2">
                                    <span class="w-2 h-2 bg-red-500 rounded-full"></span> Critical Friction
                                </h4>
                                <div class="space-y-4">
                                    ${(report.ux_friction_points || []).map(p => `
                                        <div class="flex gap-4 p-4 bg-red-500/5 rounded-2xl border border-red-500/10 text-sm text-slate-300">
                                            <span class="text-red-500 font-bold">!</span> ${p}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <h4 class="text-white text-[10px] font-black uppercase tracking-[0.3em] mb-6 flex items-center gap-2">
                                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> Resolution Roadmap
                                </h4>
                                <div class="space-y-4">
                                    ${(report.resolution_steps || []).map((s, i) => `
                                        <div class="flex gap-4 p-4 bg-green-500/5 rounded-2xl border border-green-500/10 text-sm text-slate-300">
                                            <span class="text-green-500 font-bold font-mono">0${i+1}</span> ${s}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
