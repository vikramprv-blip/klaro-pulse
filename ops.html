<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Klaro Sentinel | Omni-Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-slate-400 font-mono p-4 md:p-12">
    <div id="gate" class="max-w-md mx-auto mt-32 p-10 bg-slate-900/50 border border-slate-800 rounded-2xl backdrop-blur-xl">
        <div class="text-indigo-500 font-bold text-center mb-8 tracking-[0.2em] text-xs">AUTHORIZED ACCESS ONLY</div>
        <input type="password" id="key" class="w-full bg-black/50 border border-slate-700 p-4 rounded-xl mb-6 text-center text-white focus:border-indigo-500 outline-none transition-all">
        <button onclick="auth()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-xl hover:shadow-[0_0_20px_rgba(79,70,229,0.4)] transition-all">DECRYPT AUDIT FEED</button>
    </div>

    <div id="dash" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-white text-4xl font-black tracking-tighter">SENTINEL <span class="text-indigo-600">v1.0</span></h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500 mt-2">Proprietary Audit for Klaro Global & NomadPilot</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl text-center min-w-[120px]">
                    <div class="text-[9px] uppercase text-slate-500 mb-1">Success Rate</div>
                    <div id="success-rate" class="text-2xl font-black text-green-400">--%</div>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl text-center min-w-[120px]">
                    <div class="text-[9px] uppercase text-slate-500 mb-1">Active Blocks</div>
                    <div id="active-blocks" class="text-2xl font-black text-red-500">0</div>
                </div>
            </div>
        </div>

        <div id="reports" class="space-y-6">
            <div class="p-20 text-center animate-pulse text-indigo-500">Connecting to encrypted database...</div>
        </div>
    </div>

    <script>
        let sb;
        async function auth() {
            const k = document.getElementById('key').value;
            sb = supabase.createClient('https://vhnvclvzxkybnybqgyci.supabase.co', k);
            const { error } = await sb.from('pulse_logs').select('id').limit(1);
            if (error) return alert("ACCESS DENIED: KEY INVALID");
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
            load();
        }

        async function load() {
            const { data, error } = await sb.from('pulse_logs').select('*').order('created_at', { ascending: false }).limit(15);
            if (!data) return;

            // Calculate Success Rate
            const total = data.length;
            const healthy = data.filter(l => l.status === 'UP').length;
            document.getElementById('success-rate').innerText = `${Math.round((healthy/total)*100)}%`;
            document.getElementById('active-blocks').innerText = data.filter(l => l.status === 'DEGRADED').length;

            document.getElementById('reports').innerHTML = data.map(log => {
                const meta = log.metadata || {};
                const isNomad = log.url.includes('nomad');
                return `
                <div class="group bg-slate-900/20 border border-slate-800/60 rounded-2xl p-6 hover:border-indigo-500/50 transition-all">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full ${log.status === 'UP' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}"></div>
                            <span class="text-white font-black text-lg">${isNomad ? 'NomadPilot' : 'Klaro Services'}</span>
                            <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-400 uppercase tracking-widest">${log.region}</span>
                        </div>
                        <span class="text-[10px] font-mono text-slate-600">${new Date(log.created_at).toLocaleString()}</span>
                    </div>

                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <div class="text-[9px] uppercase text-indigo-500 font-bold mb-3 tracking-widest">Executive Intelligence</div>
                            <div class="text-sm text-slate-300 leading-relaxed border-l-2 border-indigo-900 pl-4 py-1">
                                ${log.reasoning}
                            </div>
                        </div>
                        <div class="bg-black/40 rounded-xl p-4 border border-slate-800/50">
                            <div class="text-[9px] uppercase text-slate-500 font-bold mb-4 tracking-widest">Diagnostic Payload</div>
                            <div class="space-y-3">
                                <div class="flex justify-between text-xs">
                                    <span class="text-slate-500">LAM Action</span>
                                    <span class="text-indigo-400 font-bold">${meta.action_taken?.selector || 'SCAN_ONLY'}</span>
                                </div>
                                <div class="flex justify-between text-xs">
                                    <span class="text-slate-500">Latency</span>
                                    <span class="text-white">${log.latency_ms}ms</span>
                                </div>
                                <div class="flex justify-between text-xs">
                                    <span class="text-slate-500">Compliance State</span>
                                    <span class="text-green-500">VERIFIED</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
