<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Free Trial — Klaro Pulse</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#161b27;border:1px solid #2d3748;border-radius:18px;padding:36px;width:100%;max-width:420px}
.logo{font-size:18px;font-weight:900;color:white;letter-spacing:-0.5px;margin-bottom:4px}
.logo span{color:#7c3aed}
h1{font-size:22px;font-weight:800;color:white;margin:24px 0 4px}
.sub{font-size:13px;color:#6b7280;margin-bottom:24px}
label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:5px}
input{background:#0d1117;border:1px solid #2d3748;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;width:100%;outline:none;font-family:'Inter',sans-serif;margin-bottom:14px}
input:focus{border-color:#7c3aed}
.btn{width:100%;padding:11px;background:#7c3aed;color:white;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px}
.btn:hover{background:#6d28d9}
.btn:disabled{opacity:0.5}
.error{background:#1c0505;border:1px solid #7f1d1d;color:#f87171;font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:14px}
.success{background:#052e16;border:1px solid #14532d;color:#4ade80;font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:14px}
.link{font-size:13px;color:#7c3aed;text-decoration:none}
.link:hover{text-decoration:underline}
.perks{background:#0d1117;border-radius:10px;padding:14px;margin-bottom:20px}
.perk{font-size:12px;color:#6b7280;margin-bottom:4px}
.perk span{color:#4ade80;margin-right:6px}</style>
</head>
<body>
<div class="card">
  <div class="logo">KLARO <span>PULSE</span></div>
  <h1>Start free trial</h1>
  <p class="sub">14 days free · No credit card · Cancel anytime</p>
  <div class="perks">
    <div class="perk"><span>✓</span>Unlimited journeys & AI test runs</div>
    <div class="perk"><span>✓</span>4 audit types per run (A11y, Perf, Security, AI Vision)</div>
    <div class="perk"><span>✓</span>Self-healing engine · PDF reports · Slack alerts</div>
  </div>
  <div id="err" class="error" style="display:none"></div>
  <div id="ok" class="success" style="display:none"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div><label>First Name</label><input id="fname" placeholder="John"/></div>
    <div><label>Last Name</label><input id="lname" placeholder="Smith"/></div>
  </div>
  <div><label>Work Email</label><input id="email" type="email" placeholder="you@company.com"/></div>
  <div><label>Password</label><input id="pass" type="password" placeholder="At least 8 characters"/></div>
  <div><label>Company</label><input id="company" placeholder="Acme Inc."/></div>
  <button class="btn" id="btn" onclick="signup()">Start Free Trial →</button>
  <div style="text-align:center;margin-top:16px;font-size:13px;color:#4b5563">
    Already have an account? <a href="/signin.html" class="link">Sign in</a>
  </div>
</div>
<script>
const { createClient } = supabase;
const db = createClient('https://vhnvclvzxkybnybqgyci.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZobnZjbHZ6eGt5Ym55YnFneWNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTc1MjIsImV4cCI6MjA5Mjk3MzUyMn0.toq9DNk257c58p2dNOvjc2vYBY7zClF2RY2tGv8m1VY');
async function signup(){
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  btn.disabled=true; btn.textContent='Creating account...';
  err.style.display='none'; ok.style.display='none';
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const fname=document.getElementById('fname').value.trim();
  const lname=document.getElementById('lname').value.trim();
  const company=document.getElementById('company').value.trim();
  if(!email||!pass||!fname){ err.textContent='Please fill in all required fields'; err.style.display='block'; btn.disabled=false; btn.textContent='Start Free Trial →'; return; }
  if(pass.length<8){ err.textContent='Password must be at least 8 characters'; err.style.display='block'; btn.disabled=false; btn.textContent='Start Free Trial →'; return; }
  const {data,error}=await db.auth.signUp({email,password:pass,options:{data:{first_name:fname,last_name:lname,company,plan:'growth'}}});
  if(error){err.textContent=error.message;err.style.display='block';btn.disabled=false;btn.textContent='Start Free Trial →';return;}
  if(data.session){
    window.location.href='/pulse/dashboard';
  } else {
    ok.textContent='✅ Account created! Check your email to confirm, then sign in.';
    ok.style.display='block';
    btn.textContent='Check your email →';
  }
}
</script>
</body>
</html>
